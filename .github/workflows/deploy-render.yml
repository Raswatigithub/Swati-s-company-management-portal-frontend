name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Full Stack Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Full Stack App
        if: env.RENDER_HOOK != ''
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND || secrets.RENDER_DEPLOY_HOOK }}
        run: |
          echo "Deploying Swatis Company Portal (Full Stack)..."
          curl -X POST "$RENDER_HOOK"

      - name: Verify Secret Configuration
        if: env.RENDER_HOOK == ''
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND || secrets.RENDER_DEPLOY_HOOK }}
        run: |
          echo "::error::Missing RENDER_DEPLOY_HOOK_BACKEND secret in GitHub."
          exit 1
