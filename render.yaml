services:
  - type: web
    name: swatis-company-portal
    env: node
    plan: free
    rootDir: server
    buildCommand: npm ci && cd ../client && npm ci && npm run build
    startCommand: npm run start
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URLS
        sync: false
      - key: REACT_APP_API_URL
        value: /api
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: none
